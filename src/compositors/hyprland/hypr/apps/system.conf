# Floating windows
windowrule = float on, match:tag floating-window
windowrule = center on, match:tag floating-window
windowrule = size 875 600, match:tag floating-window

windowrule = tag +floating-window, match:class (org.gnome.NautilusPreviewer|org.gnome.Evince|com.gabm.satty|About|TUI.float|imv|mpv|org.Nemo.nemo-float)
windowrule = tag +floating-window, match:class (xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus), match:title ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)
windowrule = float on, match:class org.gnome.Calculator

# Popped window rounding
windowrule = rounding 8, match:tag pop

# Prevent idle while open
windowrule = idle_inhibit always, match:tag noidle

# Chromium/Electron apps (Brave, Chrome, Signal, Discord, messenger PWAs, etc.)
# hold a persistent Wayland idle-inhibitor even when nothing is playing, which
# stops hypridle from ever locking/blanking/suspending the screen. Restrict their
# idle inhibition to fullscreen only (genuine video playback) — same approach as
# the Steam rule in steam.conf.
windowrule = idle_inhibit fullscreen, match:class ([bB]rave-.*|(google-)?[cC]hrom(e|ium).*|[mM]icrosoft-edge.*|[vV]ivaldi.*|helium|[sS]ignal.*|[dD]iscord.*|[sS]lack.*|[tT]elegram.*|[wW]hats[aA]pp.*|[eE]lement.*|[fF]erdium.*|[rR]ambox.*)
