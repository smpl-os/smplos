# smplOS Hyprland Configuration

# Per-user monitor layout — managed by Settings app (Display tab)
# File is written by settings on Apply; sourced so it persists across restarts.
source = ~/.config/hypr/monitors.conf

monitor = , preferred, auto, auto

# Theme-generated color variables (must be sourced before looknfeel)
source = ~/.config/hypr/theme.conf

source = ~/.config/hypr/envs.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/messenger-bindings.conf
source = ~/.config/hypr/apps.conf
source = ~/.config/hypr/autostart.conf

# VITURE XR glasses — recenter/toggle keybinds (renderer auto-launches via the
# xr-glasses systemd user service when the glasses are connected).
source = ~/.config/hypr/xr-workspace.conf

# Emergency recovery bindings — always sourced last, restored by smplos-os-update
# Ctrl+Alt+T=terminal  Ctrl+Alt+U=smplos-update  Ctrl+Alt+R=reload  Ctrl+Alt+A=app-center
source = ~/.config/hypr/emergency.conf
