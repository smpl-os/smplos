# smplOS Hyprland Configuration

# Per-user monitor layout — managed by Settings app (Display tab)
# File is written by settings on Apply; sourced so it persists across restarts.
source = ~/.config/hypr/monitors.conf

monitor = , preferred, auto, auto

# Theme-generated color variables (must be sourced before looknfeel)
source = ~/.config/hypr/theme.conf

source = ~/.config/hypr/envs.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/messenger-bindings.conf
source = ~/.config/hypr/apps.conf
source = ~/.config/hypr/autostart.conf
