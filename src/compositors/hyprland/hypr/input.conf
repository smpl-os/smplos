# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = compose:caps
    kb_rules = evdev

    # Key repeat: 50 Hz (20ms interval), 300ms delay before repeat starts.
    # Sent to Wayland clients via wl_keyboard::repeat_info.
    repeat_rate = 50
    repeat_delay = 300

    # Pointer events (hover, scroll, click) route to the surface UNDER the
    # cursor, but keyboard focus only changes on click. This matches
    # Windows/KDE behaviour: you can scroll a background window without
    # losing your typing context.
    #   0 = no pointer events to unfocused windows (scroll-under-mouse broken)
    #   1 = full focus-follows-mouse (focus changes when cursor crosses windows)
    #   2 = decoupled: pointer under cursor, keyboard on click  ← this
    #   3 = decoupled and click never changes keyboard focus either
    follow_mouse = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}
