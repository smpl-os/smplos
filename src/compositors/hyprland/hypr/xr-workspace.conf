# xr-workspace — Hyprland integration snippet for VITURE XR glasses.
#
# Sourced from the main Hyprland config:  source = ~/.config/hypr/xr-workspace.conf
# Canonical copy lives in the smplOS repo so it reaches both fresh installs
# (ISO) and existing installs (smplos-os-update → sync_hypr_configs).
#
# Auto-launch is handled by the xr-glasses.service systemd user unit (enabled
# by the xr-glasses migration / skel). It starts the hotplug watcher, which
# launches the renderer only when the glasses are connected — so these
# keybinds are inert until you actually plug the glasses in.

# Recenter the head-tracked view (works regardless of focus).
bind = CTRL SHIFT, C, exec, xrctl recenter

# Toggle the virtual workspace on/off manually (start/stop the renderer).
# Useful when the glasses are connected but you want flat mode temporarily.
bind = CTRL SHIFT, X, exec, pkill -x xr-workspace || xr-glasses-hotplugd --once
