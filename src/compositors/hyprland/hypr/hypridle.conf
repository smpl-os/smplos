# smplOS Hypridle Configuration
# Manages idle timeouts: screen lock, DPMS, suspend
#
# Flow: lock (5min) -> DPMS off (5.5min) -> suspend (10min)
# On wake: RE-LOCK (in case hyprlock lost the screen across suspend), let it
# paint, THEN turn the display on — so the desktop is never revealed unlocked.
#
# Why re-lock on resume: `before_sleep_cmd` triggers the lock asynchronously,
# but logind only holds suspend for InhibitDelayMaxSec (~5s). On nvidia,
# hyprlock can fail to grab the screen within that window (or die across the
# suspend), so suspend proceeds unlocked. Re-locking in `after_sleep_cmd`
# before DPMS-on guarantees a password prompt on every wake.
#
# NOTE: DPMS off and suspend are disabled inside VMs (QEMU/KVM/VirtualBox)
# because virtual displays can't handle DPMS wake and VM suspend is
# unrecoverable without ACPI passthrough.
#
# NOTE: every listener sets `ignore_inhibit = true`. Chromium/Electron apps
# (Brave, Signal, Discord, ...) hold a persistent Wayland idle-inhibitor even
# when nothing is playing, which would otherwise stop the screen from ever
# locking/blanking/suspending. ignore_inhibit makes idle purely input-based
# (fires on real keyboard/mouse inactivity). Trade-off: fullscreen video that
# receives no input will also time out — nudge the mouse to keep it awake.

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = loginctl lock-session; sleep 0.5; hyprctl dispatch "hl.dsp.dpms({state='on'})"
}

# 5min -- lock screen (hyprlock shows password dialog)
listener {
    timeout = 300
    on-timeout = loginctl lock-session
    ignore_inhibit = true
}

# 5.5min -- screen off (hyprlock stays running underneath)
listener {
    timeout = 330
    on-timeout = systemd-detect-virt -q || hyprctl dispatch "hl.dsp.dpms({state='off'})"
    on-resume = hyprctl dispatch "hl.dsp.dpms({state='on'})"
    ignore_inhibit = true
}

# 10min -- suspend (skip in VMs)
listener {
    timeout = 600
    on-timeout = systemd-detect-virt -q || systemctl suspend
    ignore_inhibit = true
}
