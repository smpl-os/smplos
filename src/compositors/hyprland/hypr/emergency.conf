# smplOS Emergency Recovery Bindings
#
# This file is ALWAYS sourced last in hyprland.conf and is restored automatically
# by smplos-os-update when missing. It provides hardcoded last-resort bindings
# that work even when the main bindings.conf is missing, corrupted, or blank.
#
# These bindings use Ctrl+Alt combinations (no Super) so they work even if the
# Super modifier is being captured or is broken.
#
# DO NOT remove or comment out this file — it is the recovery path for users
# whose system is in a broken state.

# ── Emergency terminal ────────────────────────────────────────────────────────
# Ctrl+Alt+T: open a terminal so the user can run smplos-update to recover
bind = CTRL ALT, T, exec, terminal

# ── Emergency update trigger ──────────────────────────────────────────────────
# Ctrl+Alt+U: launch the smplOS updater to pull fixes from GitHub
bind = CTRL ALT, U, exec, smplos-update --mode full

# ── Emergency config reload ───────────────────────────────────────────────────
# Ctrl+Alt+R: reload Hyprland config (pick up restored files after update)
bind = CTRL ALT, R, exec, hyprctl reload

# ── Emergency app center ──────────────────────────────────────────────────────
# Ctrl+Alt+A: open App Center so the user can click Update OS without a terminal
bind = CTRL ALT, A, exec, app-center
