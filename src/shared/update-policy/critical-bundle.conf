# smplOS critical bundle metadata
#
# This file is read by smplos-update after regular updates complete.
# If BUNDLE_ID differs from the locally applied id, the user is prompted
# to install this package set as an explicit critical-stack update.
#
# PACKAGES accepts plain package names and/or pinned specs like:
#   nvidia=570.153.02-1
#
# NOTE: pinned versions are only reliable if your repos/cache keep them.

BUNDLE_ID="2026.07.19-1"
DESCRIPTION="Fleet stack refresh: linux-lts + nvidia-open-dkms + hyprland 0.55.4-1 + kernel-modules-hook"
REBOOT_REQUIRED=1

# Hyprland is pinned to an exact version here because hyprland *plugins* are
# ABI-locked to the exact hyprland build. The bundle brings every machine to
# this one version so any future compositor plugins built against it stay in
# lockstep. hyprpaper/hypridle/hyprlock are standalone Wayland clients (not
# plugins) so they stay unpinned/latest.
#
# Kernel: smplOS runs linux-lts by default (mainline `linux` has suspend/resume
# regressions on Turing+ NVIDIA hardware). NVIDIA: nvidia-open-dkms is the
# officially-supported open-source module (Turing+, Ampere, Ada, Blackwell) —
# this is the combo NVIDIA CI-tests against linux-lts. Legacy Maxwell/Pascal/
# Volta cards get nvidia-580xx-dkms picked at install time (see
# src/shared/installer/config/hardware/nvidia.sh) and are handled per-host, not
# via this bundle.
#
# kernel-modules-hook preserves the running kernel's module tree past
# linux-lts upgrades so overlay/nvidia/dkms modules keep loading until reboot.
PACKAGES="linux-lts linux-lts-headers nvidia-open-dkms nvidia-utils lib32-nvidia-utils mesa lib32-mesa xdg-desktop-portal xdg-desktop-portal-hyprland hyprland=0.55.4-1 hyprpaper hypridle hyprlock kernel-modules-hook"