# smplOS critical bundle metadata
#
# This file is read by smplos-update after regular updates complete.
# If BUNDLE_ID differs from the locally applied id, the user is prompted
# to install this package set as an explicit critical-stack update.
#
# PACKAGES accepts plain package names and/or pinned specs like:
#   nvidia=570.153.02-1
#
# NOTE: pinned versions are only reliable if your repos/cache keep them.

BUNDLE_ID="2026.06.28-1"
DESCRIPTION="Initial policy-managed critical stack bundle"
REBOOT_REQUIRED=1

# Start with package names (latest from configured repos).
# Change entries to pkg=version when rolling out tested pinned builds.
PACKAGES="linux linux-headers nvidia nvidia-utils lib32-nvidia-utils mesa lib32-mesa xdg-desktop-portal xdg-desktop-portal-hyprland hyprland hyprpaper hypridle hyprlock"