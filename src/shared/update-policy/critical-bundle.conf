# smplOS critical bundle metadata
#
# This file is read by smplos-update after regular updates complete.
# If BUNDLE_ID differs from the locally applied id, the user is prompted
# to install this package set as an explicit critical-stack update.
#
# PACKAGES accepts plain package names and/or pinned specs like:
#   nvidia=570.153.02-1
#
# NOTE: pinned versions are only reliable if your repos/cache keep them.

BUNDLE_ID="2026.07.03-1"
DESCRIPTION="Pin Hyprland 0.55.4-1 + install matching overview plugin"
REBOOT_REQUIRED=1

# Hyprland is pinned to an exact version here because hyprland *plugins*
# (e.g. the workspace-overview plugin, libhyprtasking.so) are ABI-locked to the
# exact hyprland build. The bundle brings every machine to this one version and
# smplos-update then installs the plugin built against it — in that order. To
# move the stack forward: publish a plugin build for the new hyprland, then bump
# this pin + BUNDLE_ID together. hyprpaper/hypridle/hyprlock are standalone
# Wayland clients (not plugins) so they stay unpinned/latest.
PACKAGES="linux linux-headers nvidia nvidia-utils lib32-nvidia-utils mesa lib32-mesa xdg-desktop-portal xdg-desktop-portal-hyprland hyprland=0.55.4-1 hyprpaper hypridle hyprlock"