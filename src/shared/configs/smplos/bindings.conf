# smplOS Hyprland Keybindings
# Based on Omarchy defaults for muscle memory compatibility

# ============================================================================
# Popup click-outside-to-dismiss (start-menu, calendar)
# ============================================================================
# Non-consuming left-click watcher: every click runs popup-click-check, which
# closes any open popup if the click landed outside it. Declared in bindings.conf
# (the single source of truth); the .lua loader parses it into an hl.bind on
# Hyprland 0.55+. Internal — not shown in keybind-help.
bindn = , mouse:272, exec, popup-click-check

# ============================================================================
# Application Launchers
# ============================================================================

# Terminal: Super + Enter
bindd = SUPER, RETURN, Terminal, exec, terminal

# Start Menu (Super+Space)
bindd = SUPER, SPACE, Start Menu, exec, toggle-start-menu

# Start Menu (Super key tap — triggers on release of lone Super press).
# Flags: r=release, i=ignore_mods. ignore_mods bypasses Hyprland's release-time
# modmask gate (current mods are 0 at Super release, so a plain `bindr` is
# filtered out before firing). Shadowing still suppresses it after Super+key
# combos, so this stays a true tap-only bind.
bindri = SUPER, SUPER_L, exec, toggle-start-menu

# Start Menu (VM-friendly: Ctrl+Alt+Space, no Super key needed)
bindd = CTRL ALT, SPACE, Start Menu (VM), exec, toggle-start-menu

# App Center (install/manage apps across AUR, Flatpak, AppImage)
bindd = SUPER, A, App Center, exec, toggle-app-center

# File manager
bindd = SUPER SHIFT, F, File manager, exec, focus-or-launch nemo nemo
bindd = SUPER SHIFT ALT, F, File manager (floating), exec, nemo --class nemo-float

# Web browser
bindd = SUPER SHIFT, B, Web browser, exec, focus-web-browser

# Neovim
bindd = SUPER SHIFT, N, Neovim, exec, terminal -e nvim

# Notifications
bindd = SUPER, N, Notification Center, exec, toggle-notif-center

# System monitor
bindd = SUPER CTRL, T, Task Manager (btop), exec, terminal -e btop
bindd = CTRL SHIFT, Escape, Task Manager (btop), exec, terminal -e btop

# ============================================================================
# WINDOW MANAGEMENT (matches Omarchy tiling-v2)
# ============================================================================

# Close window
bindd = SUPER, W, Close window, killactive

# Rescue all windows to current workspace (recover off-screen/unreachable)
bindd = SUPER SHIFT, R, Rescue all windows to this workspace, exec, rescue-windows

# Control tiling
bindd = SUPER, J, Cycle layout orientation (left/top/right/bottom), layoutmsg, orientationnext
bindd = SUPER, P, Pseudo window, pseudo
bindd = SUPER, T, Toggle window floating/tiling, togglefloating
bindd = SUPER SHIFT, P, Pin window (sticky across workspaces), exec, hyprctl dispatch "hl.dsp.window.float({action='toggle'})" && hyprctl dispatch "hl.dsp.window.pin()"
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1

# Move focus with SUPER + arrow keys
bindd = SUPER, LEFT, Move focus left, movefocus, l
bindd = SUPER, RIGHT, Move focus right, movefocus, r
bindd = SUPER, UP, Move focus up, movefocus, u
bindd = SUPER, DOWN, Move focus down, movefocus, d

# Scrolling layout (native, Hyprland 0.55+) — niri/PaperWM style
# Pan the column tape to bring off-screen columns into view (no rearrange).
bindd = SUPER, bracketright, Scroll to next column, layoutmsg, move +col
bindd = SUPER, bracketleft, Scroll to previous column, layoutmsg, move -col
bindd = SUPER, backslash, Center focused column in view, layoutmsg, center
# Reorder the focused column within the tape.
bindd = SUPER SHIFT, LEFT, Move column left, layoutmsg, movewindow l
bindd = SUPER SHIFT, RIGHT, Move column right, layoutmsg, movewindow r
# Expand the focused column to fill the work area.
bindd = SUPER, R, Expand column to fill, layoutmsg, fit expand

# ============================================================================
# WORKSPACES (using keycodes like Omarchy for layout independence)
# ============================================================================

# Switch workspace with SUPER + [1-9; 0] — STOCK Hyprland behavior.
# Only the focused monitor switches; each monitor keeps its own workspace.
# Swapping monitors never strands windows. (Windows-style "all monitors jump
# together" group mode archived in bindings-group.conf.bak — restore by
# replacing this WORKSPACES section with that file's contents.)
bindd = SUPER, 1, Switch to workspace 1, workspace, 1
bindd = SUPER, 2, Switch to workspace 2, workspace, 2
bindd = SUPER, 3, Switch to workspace 3, workspace, 3
bindd = SUPER, 4, Switch to workspace 4, workspace, 4
bindd = SUPER, 5, Switch to workspace 5, workspace, 5
bindd = SUPER, 6, Switch to workspace 6, workspace, 6
bindd = SUPER, 7, Switch to workspace 7, workspace, 7
bindd = SUPER, 8, Switch to workspace 8, workspace, 8
bindd = SUPER, 9, Switch to workspace 9, workspace, 9
bindd = SUPER, 0, Switch to workspace 10, workspace, 10

# Move window to workspace with SUPER + SHIFT + [1-9; 0]
bindd = SUPER SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, 2, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, 3, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, 4, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, 5, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, 6, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, 7, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, 8, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Move window silently to workspace with SUPER + SHIFT + ALT + [1-9; 0]
bindd = SUPER SHIFT ALT, 1, Move window silently to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT ALT, 2, Move window silently to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT ALT, 3, Move window silently to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT ALT, 4, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT ALT, 5, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT ALT, 6, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT ALT, 7, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT ALT, 8, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT ALT, 9, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT ALT, 0, Move window silently to workspace 10, movetoworkspacesilent, 10

# Scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# TAB between workspaces (focused monitor only)
# Overview is the hyprtasking plugin (niri-style workspace overview). While it
# is open the mouse wheel navigates rows and Ctrl+wheel pans columns (see the
# is_active-gated binds in looknfeel.lua).
bindd = SUPER, TAB, Overview (all workspaces), exec, hyprctl eval 'hl.plugin.hyprtasking.toggle("all")'
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, -1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Move focused window to prev/next monitor (stays in same workspace group)
bindd = SUPER CTRL, LEFT, Move window to prev monitor, exec, window-to-monitor -1
bindd = SUPER CTRL, RIGHT, Move window to next monitor, exec, window-to-monitor +1

# Move workspaces between monitors
bindd = SUPER SHIFT ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Swap windows with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, LEFT, Swap window left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap window right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap window up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap window down, swapwindow, d

# Resize mode (Super+R enters, arrow keys resize, Esc/Enter exits)
bindd = SUPER, R, Resize mode (arrow keys to resize - Esc to exit), submap, resize
submap = resize
bindde = , LEFT, Shrink window width, resizeactive, -20 0
bindde = , RIGHT, Expand window width, resizeactive, 20 0
bindde = , UP, Shrink window height, resizeactive, 0 -20
bindde = , DOWN, Expand window height, resizeactive, 0 20
bindd = , ESCAPE, Exit resize mode, submap, reset
bindd = , RETURN, Exit resize mode, submap, reset
submap = reset

# Scroll through workspace groups with SUPER + scroll
bindd = SUPER, mouse_down, Scroll workspace group forward, exec, workspace-group +1
bindd = SUPER, mouse_up, Scroll workspace group backward, exec, workspace-group -1

# Move/resize windows with mouse
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Window groups
bindd = SUPER, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move window out of group, moveoutofgroup
bindd = SUPER ALT, LEFT, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, RIGHT, Move window to group on right, moveintogroup, r
bindd = SUPER ALT, UP, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, DOWN, Move window to group on bottom, moveintogroup, d
bindd = SUPER ALT, TAB, Next window in group, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous window in group, changegroupactive, b

# Alt+Tab — native crash-proof window cycler across all workspaces. Replaces the
# hyprshell GUI switcher, which stack-overflows when rendering many previews.
# Steps through every window in a stable order (Shift reverses).
bindd = ALT, TAB, Cycle windows, windowcycle
bindd = ALT SHIFT, TAB, Cycle windows (reverse), windowcycle, prev

# ============================================================================
# UTILITIES (matches Omarchy)
# ============================================================================

# Keyboard layout switching is handled natively by XKB grp:alt_shift_toggle
# set in input.conf — no Hyprland binding needed.
bindd = SUPER SHIFT, K, Settings, exec, settings --tab keyboard &

# Dictation (local AI speech-to-text via Voxtype — run 'dictation-setup' to install)
# Toggle: press Super+Ctrl+X to start recording, press again to stop and type.
# Matches Omarchy keybinding for migration compatibility.
bindd = SUPER CTRL, X, Toggle dictation, exec, dictation-toggle

# System menu / Lock
bindd = SUPER, ESCAPE, System menu, exec, powermenu
bindd = SUPER, L, Lock system, exec, lock-screen

# Keybinding help (fuzzy searchable list of all shortcuts)
bindd = SUPER, K, Show keybindings, exec, keybind-help

# Toggle bar
bindd = SUPER SHIFT, SPACE, Toggle bar, exec, bar-ctl toggle

# Theme picker (Super+Shift+T toggles)
bindd = SUPER SHIFT, T, Theme picker, exec, theme-picker

# Cycle wallpaper
bindd = SUPER SHIFT, W, Next wallpaper, exec, theme-bg-next

# Toggle window transparency
bindd = SUPER, BACKSPACE, Toggle window transparency, exec, hyprctl dispatch "hl.dsp.window.set_prop({prop='opaque', value='toggle'})"

# Notifications (dunst)
bindd = SUPER, COMMA, Dismiss last notification, exec, dunstctl close
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, dunstctl close-all
bindd = SUPER ALT, COMMA, Invoke last notification, exec, dunstctl action

# Screenshot
bindd = , PRINT, Screenshot region (with editor), exec, screenshot region edit
bindd = SHIFT, PRINT, Screenshot region (quick save), exec, screenshot region quick
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER CTRL SHIFT, A, Screen recorder (Kooha), exec, kooha

# ============================================================================
# Media Keys
# ============================================================================

# Volume
bindeld = , XF86AudioRaiseVolume, Volume up, exec, volume-ctl up 5
bindeld = , XF86AudioLowerVolume, Volume down, exec, volume-ctl down 5
bindld = , XF86AudioMute, Mute, exec, volume-ctl toggle

# Brightness
bindeld = , XF86MonBrightnessUp, Brightness up, exec, brightness-ctl 5 up
bindeld = , XF86MonBrightnessDown, Brightness down, exec, brightness-ctl 5 down

# Media playback (requires playerctl)
bindld = , XF86AudioPlay, Play/Pause, exec, playerctl play-pause
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

# ============================================================================
# Exit
# ============================================================================

# Exit Hyprland
bindd = SUPER SHIFT, E, Exit Hyprland, exit
bindd = SUPER CTRL, N, Launch Chat, exec, launch-webapp "--secure" "--clear-on-exit" "--name" "chat" "https://www.bing.com/chat"
bindd = SUPER CTRL, A, Launch Amazon, exec, launch-webapp "--name" "amazon" "https://www.amazon.com"
