# smplOS Hyprland Keybindings
# Based on Omarchy defaults for muscle memory compatibility

# ============================================================================
# APPLICATION LAUNCHERS
# ============================================================================

# Terminal: Super + Enter
bindd = SUPER, RETURN, Terminal, exec, terminal

# Start Menu (Super+Space)
bindd = SUPER, SPACE, Start Menu, exec, toggle-start-menu

# Start Menu (Super key tap — triggers on release of lone Super press)
bindr = SUPER, SUPER_L, exec, toggle-start-menu

# Start Menu (VM-friendly: Ctrl+Alt+Space, no Super key needed)
bindd = CTRL ALT, SPACE, Start Menu (VM), exec, toggle-start-menu

# App Center (install/manage apps across AUR, Flatpak, AppImage)
bindd = SUPER, A, App Center, exec, toggle-app-center

# File manager
bindd = SUPER SHIFT, F, File manager, exec, focus-or-launch nemo nemo
bindd = SUPER SHIFT ALT, F, File manager (floating), exec, nemo --class nemo-float

# Web browser
bindd = SUPER SHIFT, B, Web browser, exec, focus-web-browser

# Neovim
bindd = SUPER SHIFT, N, Neovim, exec, terminal -e nvim

# Notifications
bindd = SUPER, N, Notification Center, exec, toggle-notif-center

# System monitor
bindd = SUPER CTRL, T, Task Manager (btop), exec, terminal -e btop
bindd = CTRL SHIFT, Escape, Task Manager (btop), exec, terminal -e btop

# ============================================================================
# WINDOW MANAGEMENT (matches Omarchy tiling-v2)
# ============================================================================

# Close window
bindd = SUPER, W, Close window, killactive,

# Control tiling
bindd = SUPER, J, Toggle window split, togglesplit,
bindd = SUPER, P, Pseudo window, pseudo,
bindd = SUPER, T, Toggle window floating/tiling, togglefloating,
bindd = SUPER SHIFT, P, Pin window (sticky across workspaces), exec, hyprctl dispatch togglefloating && hyprctl dispatch pin
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1

# Move focus with SUPER + arrow keys
bindd = SUPER, LEFT, Move focus left, movefocus, l
bindd = SUPER, RIGHT, Move focus right, movefocus, r
bindd = SUPER, UP, Move focus up, movefocus, u
bindd = SUPER, DOWN, Move focus down, movefocus, d

# ============================================================================
# WORKSPACES (using keycodes like Omarchy for layout independence)
# ============================================================================

# Switch workspace GROUPS with SUPER + [1-9; 0]
# workspace-group switches ALL monitors simultaneously (Windows-style virtual desktops).
# Layout: right/primary → workspace N, left/secondary → workspace N+10
bindd = SUPER, code:10, Switch to workspace group 1, exec, workspace-group 1
bindd = SUPER, code:11, Switch to workspace group 2, exec, workspace-group 2
bindd = SUPER, code:12, Switch to workspace group 3, exec, workspace-group 3
bindd = SUPER, code:13, Switch to workspace group 4, exec, workspace-group 4
bindd = SUPER, code:14, Switch to workspace group 5, exec, workspace-group 5
bindd = SUPER, code:15, Switch to workspace group 6, exec, workspace-group 6
bindd = SUPER, code:16, Switch to workspace group 7, exec, workspace-group 7
bindd = SUPER, code:17, Switch to workspace group 8, exec, workspace-group 8
bindd = SUPER, code:18, Switch to workspace group 9, exec, workspace-group 9
bindd = SUPER, code:19, Switch to workspace group 10, exec, workspace-group 10

# Move window to workspace group with SUPER + SHIFT + [1-9; 0]
# window-to-group keeps the window on the same monitor but moves it to group N.
bindd = SUPER SHIFT, code:10, Move window to workspace group 1, exec, window-to-group 1
bindd = SUPER SHIFT, code:11, Move window to workspace group 2, exec, window-to-group 2
bindd = SUPER SHIFT, code:12, Move window to workspace group 3, exec, window-to-group 3
bindd = SUPER SHIFT, code:13, Move window to workspace group 4, exec, window-to-group 4
bindd = SUPER SHIFT, code:14, Move window to workspace group 5, exec, window-to-group 5
bindd = SUPER SHIFT, code:15, Move window to workspace group 6, exec, window-to-group 6
bindd = SUPER SHIFT, code:16, Move window to workspace group 7, exec, window-to-group 7
bindd = SUPER SHIFT, code:17, Move window to workspace group 8, exec, window-to-group 8
bindd = SUPER SHIFT, code:18, Move window to workspace group 9, exec, window-to-group 9
bindd = SUPER SHIFT, code:19, Move window to workspace group 10, exec, window-to-group 10

# Move window silently to workspace group with SUPER + SHIFT + ALT + [1-9; 0]
bindd = SUPER SHIFT ALT, code:10, Move window silently to workspace group 1, exec, window-to-group --silent 1
bindd = SUPER SHIFT ALT, code:11, Move window silently to workspace group 2, exec, window-to-group --silent 2
bindd = SUPER SHIFT ALT, code:12, Move window silently to workspace group 3, exec, window-to-group --silent 3
bindd = SUPER SHIFT ALT, code:13, Move window silently to workspace group 4, exec, window-to-group --silent 4
bindd = SUPER SHIFT ALT, code:14, Move window silently to workspace group 5, exec, window-to-group --silent 5
bindd = SUPER SHIFT ALT, code:15, Move window silently to workspace group 6, exec, window-to-group --silent 6
bindd = SUPER SHIFT ALT, code:16, Move window silently to workspace group 7, exec, window-to-group --silent 7
bindd = SUPER SHIFT ALT, code:17, Move window silently to workspace group 8, exec, window-to-group --silent 8
bindd = SUPER SHIFT ALT, code:18, Move window silently to workspace group 9, exec, window-to-group --silent 9
bindd = SUPER SHIFT ALT, code:19, Move window silently to workspace group 10, exec, window-to-group --silent 10

# Scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# TAB between workspace groups
bindd = SUPER, TAB, Next workspace group, exec, workspace-group +1
bindd = SUPER SHIFT, TAB, Previous workspace group, exec, workspace-group -1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Move focused window to prev/next monitor (stays in same workspace group)
bindd = SUPER CTRL, LEFT, Move window to prev monitor, exec, window-to-monitor -1
bindd = SUPER CTRL, RIGHT, Move window to next monitor, exec, window-to-monitor +1

# Move workspaces between monitors
bindd = SUPER SHIFT ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Swap windows with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, LEFT, Swap window left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap window right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap window up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap window down, swapwindow, d

# Alt-Tab window switching (hyprshell v4.x socat interface)
# hyprshell daemon bind creation fails silently on some Hyprland versions, so we set them here
bindd = ALT, TAB, Switch windows, exec, /usr/bin/hyprshell socat '{"OpenSwitch":{"reverse":false}}'
bindd = ALT SHIFT, TAB, Switch windows (reverse), exec, /usr/bin/hyprshell socat '{"OpenSwitch":{"reverse":true}}'
bindd = ALT, grave, Switch windows (reverse), exec, /usr/bin/hyprshell socat '{"OpenSwitch":{"reverse":true}}'
bindrd = ALT, Alt_L, Confirm window switch, exec, /usr/bin/hyprshell socat '"CloseSwitch"'
bindrd = ALT SHIFT, Alt_L, Confirm window switch, exec, /usr/bin/hyprshell socat '"CloseSwitch"'

# Resize mode (Super+R enters, arrow keys resize, Esc/Enter exits)
bindd = SUPER, R, Resize mode (arrow keys to resize - Esc to exit), submap, resize
submap = resize
bindde = , LEFT, Shrink window width, resizeactive, -20 0
bindde = , RIGHT, Expand window width, resizeactive, 20 0
bindde = , UP, Shrink window height, resizeactive, 0 -20
bindde = , DOWN, Expand window height, resizeactive, 0 20
bindd = , ESCAPE, Exit resize mode, submap, reset
bindd = , RETURN, Exit resize mode, submap, reset
submap = reset

# Scroll through workspace groups with SUPER + scroll
bindd = SUPER, mouse_down, Scroll workspace group forward, exec, workspace-group +1
bindd = SUPER, mouse_up, Scroll workspace group backward, exec, workspace-group -1

# Move/resize windows with mouse
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Window groups
bindd = SUPER, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move window out of group, moveoutofgroup
bindd = SUPER ALT, LEFT, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, RIGHT, Move window to group on right, moveintogroup, r
bindd = SUPER ALT, UP, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, DOWN, Move window to group on bottom, moveintogroup, d
bindd = SUPER ALT, TAB, Next window in group, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous window in group, changegroupactive, b

# ============================================================================
# UTILITIES (matches Omarchy)
# ============================================================================

# Keyboard layout (Alt+Shift to cycle, native XKB grp:alt_shift_toggle in input.conf)
bindrd = ALT SHIFT, Shift_L, Switch keyboard layout, exec, hyprctl switchxkblayout current next
bindd = SUPER SHIFT, K, Settings, exec, settings --tab keyboard &

# Dictation (local AI speech-to-text via Voxtype — run 'dictation-setup' to install)
# Toggle: press Super+Ctrl+X to start recording, press again to stop and type.
# Matches Omarchy keybinding for migration compatibility.
bindd = SUPER CTRL, X, Toggle dictation, exec, dictation-toggle

# System menu / Lock
bindd = SUPER, ESCAPE, System menu, exec, powermenu
bindd = SUPER CTRL, L, Lock system, exec, lock-screen

# Keybinding help (fuzzy searchable list of all shortcuts)
bindd = SUPER, K, Show keybindings, exec, keybind-help

# Toggle bar
bindd = SUPER SHIFT, SPACE, Toggle bar, exec, bar-ctl toggle

# Theme picker (Super+Shift+T toggles)
bindd = SUPER SHIFT, T, Theme picker, exec, theme-picker

# Cycle wallpaper
bindd = SUPER SHIFT, W, Next wallpaper, exec, theme-bg-next

# Toggle window transparency
bindd = SUPER, BACKSPACE, Toggle window transparency, exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle

# Notifications (dunst)
bindd = SUPER, COMMA, Dismiss last notification, exec, dunstctl close
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, dunstctl close-all
bindd = SUPER ALT, COMMA, Invoke last notification, exec, dunstctl action

# Screenshot
bindd = , PRINT, Screenshot with editing, exec, screenshot region
bindd = SHIFT, PRINT, Screenshot to clipboard, exec, screenshot fullscreen
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER SHIFT, A, Screenshot (Flameshot), exec, flameshot gui
bindd = SUPER CTRL SHIFT, A, Screen recorder (Kooha), exec, kooha

# ============================================================================
# MEDIA KEYS
# ============================================================================

# Volume
bindeld = , XF86AudioRaiseVolume, Volume up, exec, volume-ctl up 5
bindeld = , XF86AudioLowerVolume, Volume down, exec, volume-ctl down 5
bindld = , XF86AudioMute, Mute, exec, volume-ctl toggle

# Brightness
bindeld = , XF86MonBrightnessUp, Brightness up, exec, brightness-ctl 5 up
bindeld = , XF86MonBrightnessDown, Brightness down, exec, brightness-ctl 5 down

# Media playback (requires playerctl)
bindld = , XF86AudioPlay, Play/Pause, exec, playerctl play-pause
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

# ============================================================================
# EXIT
# ============================================================================

# Exit Hyprland
bindd = SUPER SHIFT, E, Exit Hyprland, exit
