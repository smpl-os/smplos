name: Release

# Triggered manually. Every run increments the patch version, commits it,
# tags the release, builds all apps, and publishes binaries.
#
# Usage: GitHub → Actions → Release → Run workflow
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-and-release:
    name: Bump version, build, release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install git
        run: pacman -Sy --noconfirm --needed git

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Bump patch version in workspace Cargo.toml
        id: version
        run: |
          CURRENT=$(grep -m1 '^version\s*=' Cargo.toml | grep -oP '\d+\.\d+\.\d+')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "0,/^version\s*=\s*\"${CURRENT}\"/s//version    = \"${NEW_VERSION}\"/" Cargo.toml
          echo "old=$CURRENT"     >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW_VERSION"

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel rust cargo mold \
            fontconfig freetype2 \
            libxkbcommon wayland wayland-protocols \
            pixman libglvnd mesa \
            gtk4 gtk4-layer-shell libadwaita \
            glib2 gobject-introspection \
            dbus

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build all apps (release)
        run: |
          export RUSTFLAGS="-C link-arg=-fuse-ld=mold"
          cargo build --release --workspace

      - name: Commit version bump and tag
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git tag "${{ steps.version.outputs.tag }}"
          git pull --rebase origin main || true
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Strip and collect binaries
        run: |
          mkdir -p dist
          for bin in start-menu notif-center settings app-center webapp-center \
                     sync-center-daemon sync-center-gui \
                     smpl-calendar smpl-calendar-alertd; do
            src="target/release/$bin"
            if [[ -f "$src" ]]; then
              strip "$src"
              cp "$src" dist/
            fi
          done
          ls -lh dist/

      - name: Create bundle tarball
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          tar -czf "smpl-apps-${VERSION}-x86_64.tar.gz" -C dist .
          echo "BUNDLE=smpl-apps-${VERSION}-x86_64.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "smpl-apps v${{ steps.version.outputs.new }}"
          generate_release_notes: true
          files: |
            ${{ env.BUNDLE }}
            dist/start-menu
            dist/notif-center
            dist/settings
            dist/app-center
            dist/webapp-center
            dist/sync-center-daemon
            dist/sync-center-gui
            dist/smpl-calendar
            dist/smpl-calendar-alertd
